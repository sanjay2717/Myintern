services:
  - type: web
    name: myintern-recommender
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/app.py
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true