<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Myintern — Find Your Internship</title>
  <style>

    /* ── RESET ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      color: #333;
    }

    /* ── HEADER ── */
    .header {
      background: #1565C0;
      color: white;
      text-align: center;
      padding: 30px 20px 20px;
    }

    .header h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
    }

    .header .fullform {
      font-size: 0.78rem;
      margin-top: 4px;
      opacity: 0.85;
      letter-spacing: 1px;
    }

    .header .tagline {
      margin-top: 10px;
      font-size: 1rem;
      opacity: 0.95;
    }

    /* ── FORM CARD ── */
    .form-container {
      max-width: 600px;
      margin: 30px auto;
      background: white;
      border-radius: 12px;
      padding: 30px 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .form-container h2 {
      text-align: center;
      color: #1565C0;
      margin-bottom: 24px;
      font-size: 1.2rem;
    }

    .field-group {
      margin-bottom: 20px;
    }

    .field-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #444;
      font-size: 0.95rem;
    }

    .field-group select,
    .field-group input {
      width: 100%;
      padding: 13px 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      color: #333;
      background: #fafafa;
      transition: border 0.2s;
    }

    .field-group select:focus,
    .field-group input:focus {
      border-color: #1565C0;
      outline: none;
      background: white;
    }

    .field-note {
      font-size: 0.78rem;
      color: #888;
      margin-top: 4px;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: #1565C0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: #0D47A1;
    }

    /* ── SPINNER ── */
    .spinner {
      display: none;
      text-align: center;
      padding: 30px;
    }

    .spinner-circle {
      width: 45px;
      height: 45px;
      border: 5px solid #ddd;
      border-top: 5px solid #1565C0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── RESULTS ── */
    .results-container {
      max-width: 600px;
      margin: 0 auto 40px;
      display: none;
    }

    .results-header {
      text-align: center;
      padding: 10px 0 20px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #1565C0;
    }

    /* ── CARD ── */
    .card {
      background: white;
      border-radius: 12px;
      padding: 22px 20px;
      margin-bottom: 16px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.09);
      border-left: 5px solid #1565C0;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: bold;
      color: #1a1a1a;
    }

    .card-company {
      font-size: 0.88rem;
      color: #666;
      margin-top: 3px;
    }

    .match-badge {
      font-size: 1.3rem;
      font-weight: bold;
      min-width: 60px;
      text-align: center;
      padding: 6px 10px;
      border-radius: 8px;
      white-space: nowrap;
    }

    .match-high   { background: #E8F5E9; color: #2E7D32; }
    .match-medium { background: #FFF8E1; color: #F57F17; }
    .match-low    { background: #FFEBEE; color: #C62828; }

    .sector-badge {
      display: inline-block;
      background: #E3F2FD;
      color: #1565C0;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: bold;
      margin: 10px 0 12px;
    }

    .card-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 0.88rem;
      color: #555;
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-icon {
      font-size: 1rem;
    }

    .apply-btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: #1565C0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s;
    }

    .apply-btn:hover {
      background: #0D47A1;
    }

    /* ── NO RESULTS ── */
    .no-results {
      text-align: center;
      padding: 30px;
      background: white;
      border-radius: 12px;
      color: #888;
      font-size: 1rem;
    }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      .header h1 { font-size: 2rem; }
      .card-details { grid-template-columns: 1fr; }
      .form-container { margin: 15px; padding: 20px 15px; }
      .results-container { margin: 0 15px 30px; }
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>Myintern</h1>
    <div class="fullform">
      Digital Internship Suggestion &amp; Hyper-personalized Assistance
    </div>
    <div class="tagline">
      🎯 Find your perfect internship in 30 seconds — Free
    </div>
  </div>

  <!-- FORM -->
  <div class="form-container">
    <h2>Tell us about yourself</h2>
    <form id="recommendForm">

      <!-- Education -->
      <div class="field-group">
        <label>📚 Education Level</label>
        <select id="education" required>
          <option value="">Select your education</option>
          <option value="Class 10">Class 10</option>
          <option value="Class 12">Class 12</option>
          <option value="Diploma">Diploma</option>
          <option value="Graduate">Graduate</option>
          <option value="Post Graduate">Post Graduate</option>
        </select>
      </div>

      <!-- Skills -->
      <div class="field-group">
        <label>🛠️ Your Skills</label>
        <input
          type="text"
          id="skills"
          placeholder="Example: computer, farming, cooking, teaching"
        />
        <div class="field-note">Leave empty if you are unsure — that is okay!</div>
      </div>

      <!-- Sector -->
      <div class="field-group">
        <label>🏢 Sector Interest</label>
        <select id="sector" required>
          <option value="">Select a sector</option>
          <option value="Agriculture">Agriculture</option>
          <option value="IT">Information Technology</option>
          <option value="Health">Health</option>
          <option value="Education">Education</option>
          <option value="Finance">Finance</option>
          <option value="Manufacturing">Manufacturing</option>
          <option value="Retail">Retail</option>
          <option value="Infrastructure">Infrastructure</option>
        </select>
      </div>

      <!-- Location -->
      <div class="field-group">
        <label>📍 Preferred State</label>
        <select id="location" required>
          <option value="">Select your state</option>
          <option>Andhra Pradesh</option>
          <option>Bihar</option>
          <option>Chhattisgarh</option>
          <option>Delhi</option>
          <option>Gujarat</option>
          <option>Haryana</option>
          <option>Himachal Pradesh</option>
          <option>Jharkhand</option>
          <option>Karnataka</option>
          <option>Kerala</option>
          <option>Madhya Pradesh</option>
          <option>Maharashtra</option>
          <option>OMyintern</option>
          <option>Punjab</option>
          <option>Rajasthan</option>
          <option>Tamil Nadu</option>
          <option>Telangana</option>
          <option>Uttar Pradesh</option>
          <option>Uttarakhand</option>
          <option>West Bengal</option>
        </select>
      </div>

      <button type="submit" class="submit-btn">
        Find My Internships →
      </button>

    </form>
  </div>

  <!-- SPINNER -->
  <div class="spinner" id="spinner">
    <div class="spinner-circle"></div>
    <div>Finding best matches for you...</div>
  </div>

  <!-- RESULTS -->
  <div class="results-container" id="resultsContainer">
    <div class="results-header" id="resultsHeader"></div>
    <div id="cardsList"></div>
  </div>

  <script>

    document.getElementById("recommendForm")
      .addEventListener("submit", async function (e) {
        e.preventDefault();

        const education = document.getElementById("education").value;
        const skills    = document.getElementById("skills").value;
        const sector    = document.getElementById("sector").value;
        const location  = document.getElementById("location").value;

        // Show spinner
        document.getElementById("spinner").style.display = "block";
        document.getElementById("resultsContainer").style.display = "none";
        document.getElementById("cardsList").innerHTML = "";

        try {
          const response = await fetch("/recommend", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ education, skills, sector, location })
          });

          const data = await response.json();

          // Hide spinner
          document.getElementById("spinner").style.display = "none";
          document.getElementById("resultsContainer").style.display = "block";

          if (!data.success || data.recommendations.length === 0) {
            document.getElementById("cardsList").innerHTML =
              `<div class="no-results">
                 😕 No matches found. Try changing your inputs.
               </div>`;
            return;
          }

          document.getElementById("resultsHeader").textContent =
            "🎯 Your Top " + data.count + " Internship Matches";

          data.recommendations.forEach(function (item) {

            // Match badge color
            let badgeClass = "match-low";
            if (item.match_score >= 80) badgeClass = "match-high";
            else if (item.match_score >= 50) badgeClass = "match-medium";

            const card = `
              <div class="card">
                <div class="card-top">
                  <div>
                    <div class="card-title">${item.title}</div>
                    <div class="card-company">${item.company}</div>
                  </div>
                  <div class="match-badge ${badgeClass}">
                    ${item.match_score}%<br/>
                    <span style="font-size:0.6rem;font-weight:normal;">Match</span>
                  </div>
                </div>

                <div class="sector-badge">${item.sector}</div>

                <div class="card-details">
                  <div class="detail-item">
                    <span class="detail-icon">📍</span>
                    <span>${item.location}</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-icon">🎓</span>
                    <span>${item.education_required}</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-icon">💰</span>
                    <span>₹${item.stipend} / month</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-icon">⏱️</span>
                    <span>${item.duration} months</span>
                  </div>
                </div>

                <button class="apply-btn">Apply Now →</button>
              </div>
            `;

            document.getElementById("cardsList")
              .insertAdjacentHTML("beforeend", card);
          });

        } catch (error) {
          document.getElementById("spinner").style.display = "none";
          document.getElementById("cardsList").innerHTML =
            `<div class="no-results">
               ⚠️ Something went wrong. Please try again.
             </div>`;
          document.getElementById("resultsContainer").style.display = "block";
        }
    });

  </script>

</body>
</html>
